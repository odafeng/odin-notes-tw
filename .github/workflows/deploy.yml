name: deploy
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      # GitHub Pages 後端偶發 transient 失敗（Deployment failed, try again later）。
      # 第一次嘗試失敗不讓 job 掛掉，自動做第二次嘗試——pipeline 自癒，不需人工 rerun。
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 900000
          error_count: 25
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 900000
          error_count: 25

# 部署方式：GitHub Actions 原生 Pages（build → upload-pages-artifact → deploy-pages）。
# 到 repo Settings → Pages 需把 Source 設為「GitHub Actions」（本專案已用 API 設定）。
#
# 私有替代方案：GitHub Pages 免費方案強制公開網站。
# 想只給自己看：repo 設 private，刪掉這個 workflow，
# 改用 Cloudflare Pages（build command: `pip install -r requirements.txt && mkdocs build`，
# output directory: `site`），前面掛 Cloudflare Access 限本人登入。免費額度足夠。
