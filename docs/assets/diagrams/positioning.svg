<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 250" width="440" height="250" role="img" aria-label="CSS 定位：relative 以自身原位偏移；absolute 以最近的已定位祖先為基準">
  <rect x="1" y="1" width="438" height="248" rx="10" fill="#faf8f3" stroke="#ece6d8"/>
  <text x="20" y="26" font-family="system-ui,sans-serif" font-size="13" fill="#1b2a4a" font-weight="700">position: relative 與 absolute</text>
  <!-- 左：relative -->
  <rect x="28" y="46" width="180" height="170" rx="6" fill="#1b2a4a" fill-opacity="0.05" stroke="#1b2a4a" stroke-dasharray="4 4"/>
  <rect x="46" y="84" width="70" height="46" rx="4" fill="#cbd5e4" stroke="#9fb0c9" stroke-dasharray="3 3"/>
  <text x="81" y="112" font-family="system-ui,sans-serif" font-size="11" fill="#6b7c96" text-anchor="middle">原位</text>
  <rect x="76" y="114" width="70" height="46" rx="4" fill="#4a6fa5"/>
  <text x="111" y="142" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">relative</text>
  <path d="M116 107 L146 137" stroke="#d98a0b" stroke-width="2" fill="none" marker-end="url(#pa)"/>
  <text x="118" y="205" font-family="system-ui,sans-serif" font-size="11" fill="#5b6a80" text-anchor="middle">以「自己原本的位置」偏移</text>
  <!-- 右：absolute -->
  <rect x="232" y="46" width="180" height="170" rx="6" fill="#3a8a5a" fill-opacity="0.08" stroke="#3a8a5a"/>
  <text x="242" y="64" font-family="system-ui,sans-serif" font-size="11" fill="#2c6a45" font-weight="700">position: relative 的祖先</text>
  <rect x="330" y="58" width="70" height="46" rx="4" fill="#d98a0b"/>
  <text x="365" y="86" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">absolute</text>
  <text x="322" y="205" font-family="system-ui,sans-serif" font-size="11" fill="#5b6a80" text-anchor="middle">貼齊「最近的已定位祖先」角落</text>
  <defs><marker id="pa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#d98a0b"/></marker></defs>
</svg>
