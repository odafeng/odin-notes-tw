<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280" role="img" aria-label="CSS Grid：欄（column）、列（row）與間距（gap）">
  <rect x="1" y="1" width="438" height="278" rx="10" fill="#faf8f3" stroke="#ece6d8"/>
  <text x="20" y="28" font-family="system-ui,sans-serif" font-size="13" fill="#1b2a4a" font-weight="700">grid-template-columns: 1fr 1fr 1fr · gap</text>
  <!-- grid cells: 3 cols x 2 rows, cell 120x80, gap 14, origin 40,50 -->
  <g fill="#4a6fa5">
    <rect x="40"  y="50"  width="104" height="80" rx="4"/>
    <rect x="158" y="50"  width="104" height="80" rx="4"/>
    <rect x="276" y="50"  width="104" height="80" rx="4"/>
    <rect x="40"  y="144" width="104" height="80" rx="4"/>
    <rect x="158" y="144" width="104" height="80" rx="4"/>
    <rect x="276" y="144" width="104" height="80" rx="4"/>
  </g>
  <!-- gap markers -->
  <rect x="144" y="50" width="14" height="174" fill="#d98a0b" fill-opacity="0.3"/>
  <rect x="262" y="50" width="14" height="174" fill="#d98a0b" fill-opacity="0.3"/>
  <rect x="40" y="130" width="340" height="14" fill="#d98a0b" fill-opacity="0.3"/>
  <text x="210" y="252" font-family="system-ui,sans-serif" font-size="12" fill="#a8690a" font-weight="700" text-anchor="middle">橘色＝gap（軌道間距）</text>
  <text x="18" y="95"  font-family="system-ui,sans-serif" font-size="11" fill="#2c6a45" font-weight="700" text-anchor="middle" transform="rotate(-90 18 95)">row 列</text>
  <text x="92" y="44"  font-family="system-ui,sans-serif" font-size="11" fill="#1b2a4a" font-weight="700" text-anchor="middle">column 欄</text>
</svg>
