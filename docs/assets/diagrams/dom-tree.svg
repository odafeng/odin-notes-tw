<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 250" width="440" height="250" role="img" aria-label="DOM 樹：document 之下是 html，再分出 head 與 body，body 內有各元素節點">
  <rect x="1" y="1" width="438" height="248" rx="10" fill="#faf8f3" stroke="#ece6d8"/>
  <text x="20" y="26" font-family="system-ui,sans-serif" font-size="13" fill="#1b2a4a" font-weight="700">DOM：把 HTML 讀成一棵節點樹</text>
  <g font-family="ui-monospace,monospace" font-size="12" text-anchor="middle">
    <rect x="185" y="40" width="70" height="26" rx="13" fill="#1b2a4a"/><text x="220" y="57" fill="#fff">document</text>
    <rect x="192" y="86" width="56" height="24" rx="12" fill="#4a6fa5"/><text x="220" y="102" fill="#fff">html</text>
    <rect x="102" y="132" width="56" height="24" rx="12" fill="#4a6fa5"/><text x="130" y="148" fill="#fff">head</text>
    <rect x="282" y="132" width="56" height="24" rx="12" fill="#4a6fa5"/><text x="310" y="148" fill="#fff">body</text>
    <rect x="60" y="182" width="60" height="24" rx="12" fill="#8fa7c7"/><text x="90" y="198" fill="#fff">title</text>
    <rect x="212" y="182" width="52" height="24" rx="12" fill="#d98a0b"/><text x="238" y="198" fill="#fff">h1</text>
    <rect x="284" y="182" width="52" height="24" rx="12" fill="#d98a0b"/><text x="310" y="198" fill="#fff">p</text>
    <rect x="356" y="182" width="52" height="24" rx="12" fill="#d98a0b"/><text x="382" y="198" fill="#fff">ul</text>
  </g>
  <g stroke="#9fb0c9" stroke-width="1.6">
    <line x1="220" y1="66" x2="220" y2="86"/>
    <line x1="220" y1="110" x2="130" y2="132"/><line x1="220" y1="110" x2="310" y2="132"/>
    <line x1="130" y1="156" x2="90" y2="182"/>
    <line x1="310" y1="156" x2="238" y2="182"/><line x1="310" y1="156" x2="310" y2="182"/><line x1="310" y1="156" x2="382" y2="182"/>
  </g>
  <text x="220" y="236" font-family="system-ui,sans-serif" font-size="11" fill="#5b6a80" text-anchor="middle">querySelector 等 API 走訪的就是這棵樹</text>
</svg>
