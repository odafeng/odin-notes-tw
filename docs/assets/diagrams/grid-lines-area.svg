<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 260" width="440" height="260" role="img" aria-label="Grid 線編號與 grid-area：欄線與列線從 1 起算，項目以起訖線定位，例如 grid-column: 2 / 4">
  <rect x="1" y="1" width="438" height="258" rx="10" fill="#faf8f3" stroke="#ece6d8"/>
  <text x="20" y="26" font-family="system-ui,sans-serif" font-size="13" fill="#1b2a4a" font-weight="700">grid-column: 2 / 4 · grid-row: 1 / 3（用「線」定位）</text>
  <g stroke="#9fb0c9" stroke-width="1.4">
    <line x1="60" y1="50" x2="60" y2="230"/><line x1="170" y1="50" x2="170" y2="230"/>
    <line x1="280" y1="50" x2="280" y2="230"/><line x1="390" y1="50" x2="390" y2="230"/>
    <line x1="60" y1="50" x2="390" y2="50"/><line x1="60" y1="140" x2="390" y2="140"/><line x1="60" y1="230" x2="390" y2="230"/>
  </g>
  <g font-family="ui-monospace,monospace" font-size="12" fill="#a8690a" font-weight="700">
    <text x="56" y="44" text-anchor="end">1</text><text x="166" y="44" text-anchor="end">2</text>
    <text x="276" y="44" text-anchor="end">3</text><text x="386" y="44" text-anchor="end">4</text>
    <text x="50" y="56">1</text><text x="50" y="146">2</text><text x="50" y="236">3</text>
  </g>
  <rect x="174" y="54" width="212" height="172" rx="4" fill="#4a6fa5" fill-opacity="0.85"/>
  <text x="280" y="145" font-family="ui-monospace,monospace" font-size="13" fill="#fff" text-anchor="middle">item：欄線 2→4、列線 1→3</text>
</svg>
